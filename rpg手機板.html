<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0e0e1a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<title>Mini Challenge RPG - 繼承與轉生版</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Noto+Sans+TC:wght@300;400;700&display=swap');

:root {
  --bg: #0e0e1a;
  --panel: #151528;
  --panel2: #1a1a32;
  --accent: #f9c74f;
  --accent2: #e94560;
  --blue: #3a86ff;
  --purple: #9d4edd;
  --green: #43aa8b;
  --border: #2a2a4a;
  --text: #dde2f0;
  --muted: #7a7a9a;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Noto Sans TC', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

/* Layout - 針對手機進行響應式改良 */
#app { 
  display: grid; 
  grid-template-columns: 260px 1fr; 
  grid-template-rows: auto 1fr; 
  min-height: 100vh; 
}
#topbar { 
  grid-column: 1/-1; 
  background: #0a0a14; 
  border-bottom: 1px solid var(--border); 
  padding: 10px 20px; 
  display: flex; 
  align-items: center; 
  gap: 20px; 
  flex-wrap: wrap;
}
#sidebar { background: var(--panel); border-right: 1px solid var(--border); padding: 14px; overflow-y: auto; }
#main { background: var(--bg); overflow-y: auto; }

/* 手機版 RWD 樣式覆蓋 */
@media (max-width: 768px) {
  #app {
    grid-template-columns: 1fr;
    grid-template-rows: auto auto 1fr;
  }
  #sidebar {
    border-right: none;
    border-bottom: 1px solid var(--border);
    padding: 10px;
  }
  .zone-list {
    flex-direction: row !important;
    overflow-x: auto;
    padding-bottom: 5px;
  }
  .zone-card {
    flex-shrink: 0;
    min-width: 140px;
  }
  .sep, .section-title { display: none; }
  .mob-grid {
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)) !important;
  }
}

.title-font { font-family: 'Cinzel', serif; color: var(--accent); }

/* Tabs */
.tabs { display: flex; border-bottom: 1px solid var(--border); background: var(--panel); overflow-x: auto; }
.tab { padding: 10px 15px; cursor: pointer; font-size: 13px; color: var(--muted); border-bottom: 2px solid transparent; transition: .2s; flex-shrink: 0; }
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }
.tab:hover:not(.active) { color: var(--text); }
.tab-content { display: none; padding: 16px; }
.tab-content.active { display: block; }

/* Stat Bar */
.stat-row { display: flex; gap: 8px; flex-wrap: wrap; }
.stat-chip { background: var(--panel2); border: 1px solid var(--border); border-radius: 6px; padding: 6px 10px; font-size: 12px; display: flex; align-items: center; gap: 4px; }
.stat-chip b { color: var(--accent); font-size: 14px; }

/* Progress Bars */
.xp-bar-wrap { margin: 8px 0; }
.xp-label { font-size: 11px; color: var(--muted); margin-bottom: 3px; }
.xp-bar { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
.xp-fill { height: 100%; background: linear-gradient(90deg, #3a86ff, #9d4edd); transition: width .4s; }

.hp-bar-wrap { margin-bottom: 6px; }
.hp-label { font-size: 11px; color: var(--muted); display: flex; justify-content: space-between; margin-bottom: 2px; }
.hp-bar { height: 8px; background: var(--border); border-radius: 4px; overflow: hidden; }
.hp-fill { height: 100%; background: linear-gradient(90deg, #e94560, #f9c74f); transition: width .3s; }
.hp-fill.enemy { background: linear-gradient(90deg, #43aa8b, #3a86ff); }

/* Lists & Grids */
.zone-list { display: flex; flex-direction: column; gap: 8px; }
.zone-card { background: var(--panel2); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; cursor: pointer; transition: .2s; }
.zone-card:hover:not(.locked) { border-color: var(--accent); background: #1e1e38; }
.zone-card.active { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent); }
.zone-card.locked { opacity: .45; cursor: not-allowed; }
.zone-name { font-size: 13px; font-weight: 700; color: var(--accent); }
.zone-lv { font-size: 11px; color: var(--muted); }

.mob-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(210px, 1fr)); gap: 12px; }
.mob-card { background: var(--panel); border: 1px solid var(--border); border-radius: 10px; padding: 14px; cursor: pointer; transition: .2s; position: relative; }
.mob-card:hover:not(.disabled-boss) { border-color: var(--blue); transform: translateY(-1px); }
.mob-card.is-boss { border-color: #f9c74f55; background: #1a1808; }
.mob-card.is-boss:hover:not(.disabled-boss) { border-color: var(--accent); }
.mob-icon { font-size: 40px; text-align: center; margin-bottom: 8px; }
.mob-name { font-weight: 700; font-size: 14px; text-align: center; margin-bottom: 6px; }
.mob-stats { font-size: 11px; color: var(--muted); display: grid; grid-template-columns: 1fr 1fr; gap: 2px; }
.mob-stat { display: flex; align-items: center; gap: 4px; }
.boss-crown { position: absolute; top: 6px; right: 8px; font-size: 12px; color: var(--accent); }
.drop-hint { font-size: 10px; margin-top: 6px; color: #aaa; border-top: 1px solid var(--border); padding-top: 5px; }

/* Combat Log */
#combat-panel { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 16px; margin-bottom: 12px; }
.combatants { display: grid; grid-template-columns: 1fr auto 1fr; gap: 12px; align-items: center; margin: 12px 0; }
.combatant { background: var(--panel2); border-radius: 8px; padding: 12px; }
.combatant-name { font-weight: 700; font-size: 13px; margin-bottom: 6px; }
.vs { text-align: center; font-family: 'Cinzel', serif; font-size: 22px; color: var(--accent2); }
.combat-log { background: #0a0a14; border-radius: 6px; height: 150px; overflow-y: auto; padding: 10px; font-size: 12px; line-height: 1.8; }
.log-hit { color: var(--accent2); }
.log-mob { color: var(--blue); }
.log-win { color: var(--green); font-weight: 700; }
.log-lose { color: var(--accent2); font-weight: 700; }
.log-drop { color: var(--accent); font-weight: 700; }
.log-level { color: #ff9f1c; font-weight: 700; }

/* Buttons & Items */
.btn { background: var(--accent2); color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 13px; font-family: inherit; transition: .15s; user-select: none; }
.btn:hover:not(:disabled) { filter: brightness(1.2); }
.btn:disabled { background: #333; color: #666; cursor: not-allowed; filter: none; }
.btn-gold { background: var(--accent); color: #111; }
.btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--muted); }
.btn-ghost:hover { border-color: var(--text); color: var(--text); }
.btn-sm { padding: 5px 10px; font-size: 12px; }

.item { display: inline-block; padding: 3px 8px; margin: 2px; border-radius: 4px; font-size: 12px; cursor: pointer; }
.item:hover { filter: brightness(1.3); }
.r1 { background: #555; color: #fff; }
.r2 { background: #1a4fff; color: #fff; }
.r3 { background: #6b21b8; color: #fff; }
.r4 { background: #b8860b; color: #fff; box-shadow: 0 0 6px #f9c74f55; }

.bestiary-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 12px; }
.bestiary-card { background: var(--panel); border: 1px solid var(--border); border-radius: 10px; padding: 14px; }
.bestiary-card.undiscovered { filter: grayscale(1) opacity(.4); }

.equip-slots { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin: 8px 0; }
.equip-slot { background: var(--panel2); border: 1px dashed var(--border); border-radius: 8px; padding: 10px; text-align: center; font-size: 12px; }
.equip-slot .slot-label { color: var(--muted); font-size: 10px; margin-bottom: 4px; }
.inv-grid { display: flex; flex-wrap: wrap; gap: 4px; }

.sep { border: none; border-top: 1px solid var(--border); margin: 10px 0; }
.empty { color: var(--muted); font-size: 13px; padding: 10px 0; }
.flex { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
.section-title { font-size: 11px; text-transform: uppercase; letter-spacing: .1em; color: var(--muted); margin: 12px 0 6px; }
.badge { display: inline-block; padding: 2px 7px; border-radius: 10px; font-size: 11px; }
.badge-blue { background: #3a86ff22; color: #7ab4ff; border: 1px solid #3a86ff44; }
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>
<div id="app">

    <div class="equip-slots">

      <div class="equip-slot"><div class="slot-label">💍 飾品</div><div id="eq-acc">無</div></div>
    </div>
    
    <hr class="sep">
    <div class="section-title">🎒 永久儲藏倉庫 <span id="inv-count" style="color:var(--muted);"></span></div>
    <div class="inv-grid" id="inventory"></div>
    
    <hr class="sep">
    <div class="section-title">📊 綜合詳細屬性數據</div>

  </div>

</div>

</div>

  "諸神天衣":     { slot:"armor",  defPct: 2.00, hpPct: 1.30, rarity:3, desc: "✨ 防禦 +200%、生命 +130%" },

  "火神璽印":     { slot:"acc",    atkPct: 0.55, defPct: 0.35, rarity:3, desc: "🔥 攻擊 +55%、防禦 +35%" },
  "命運命輪":     { slot:"acc",    dropRate: 0.25, atkPct: 0.45, rarity:3, desc: "✨ 25% 掉寶率增幅，全攻擊激增 +45%" },
};

const SHOP_ITEMS = [
  { name: "新手練習木劍", price: 20 },
  { name: "生鏽鐵劍",     price: 35 },
  { name: "破舊布衣",     price: 20 },
  { name: "厚皮背心",     price: 35 },
  { name: "殘破草帽",     price: 15 },
  { name: "幸運草手環",   price: 40 },
  { name: "短鐵劍",       price: 100 },
  { name: "平衡訓練刃",   price: 125 },
  { name: "皮上衣",       price: 130 },
  { name: "流浪者輕甲",   price: 145 },
  { name: "殘心符",       price: 180 },
  { name: "吸血鬼之牙",   price: 320 },
  { name: "利刃墜飾",     price: 260 },
  { name: "破滅之玉",     price: 480 },
];

const RARITY_NAMES = ["","普通","稀有","史詩","傳說"];
const XP_TABLE = Array.from({length:100}, (_,i) => Math.floor(60 * Math.pow(1.24, i)));

let player = {
  baseHp: 100, baseAtk: 10, baseDef: 4, hp: 100, level: 1, xp: 0, gold: 0,
  challenges: 30, maxChallenges: 30, equipment: { weapon: null, armor: null, acc: null },
  inventory: [], unlockedZone: 0, discovered: {}, defeatedBosses: {}, statPoints: 0,
  statsAlloc: { hp: 0, atk: 0, def: 0, luk: 0 }
};

let selectedZone = 0;
let fightRunning = false;

function load() {
  try {
    const s = localStorage.getItem("mcrpg_rebirth_v2");
    if (s) Object.assign(player, JSON.parse(s));
    if (!player.defeatedBosses) player.defeatedBosses = {};
    if (!player.discovered) player.discovered = {};
    if (!player.statsAlloc) player.statsAlloc = { hp: 0, atk: 0, def: 0, luk: 0 };
    if (player.statPoints === undefined) player.statPoints = 0;
    player.hp = getStats().hp;
  } catch(e) {}
}

function save() { try { localStorage.setItem("mcrpg_rebirth_v2", JSON.stringify(player)); } catch(e){} }

function getStats() {
  let rawHp = player.baseHp + (player.level - 1) * 15 + (player.statsAlloc.hp * 35);
  let rawAtk = player.baseAtk + (player.level - 1) * 2 + (player.statsAlloc.atk * 5);
  let rawDef = player.baseDef + (player.level - 1) * 1 + (player.statsAlloc.def * 3);
  let rawLukBonus = player.statsAlloc.luk * 0.01;

  let hpPct = 0, atkPct = 0, defPct = 0, lifesteal = 0, dropRate = 0, goldBonus = 0;
  for (const slot of ["weapon","armor","acc"]) {
    const name = player.equipment[slot];
    if (name && ITEM_DB[name]) {
      const it = ITEM_DB[name];
      hpPct  += it.hpPct  || 0; atkPct += it.atkPct || 0; defPct += it.defPct || 0;
      lifesteal += it.lifesteal || 0; dropRate += it.dropRate || 0; goldBonus += it.goldBonus || 0;
    }
  }
  return { hp: Math.floor(rawHp * (1 + hpPct)), atk: Math.floor(rawAtk * (1 + atkPct)), def: Math.floor(rawDef * (1 + defPct)), lifesteal, dropRate: dropRate + rawLukBonus, goldBonus: goldBonus + rawLukBonus };
}

function xpForNext() { return XP_TABLE[Math.min(player.level-1, XP_TABLE.length-1)]; }

function gainXP(amount) {
  player.xp += amount;
  let leveled = false;
  while (player.xp >= xpForNext() && player.level < 99) {
    player.xp -= xpForNext(); player.level++; player.statPoints += 5; leveled = true;
  }
  return leveled;
}

function checkAndTriggerRebirth() {
  if (player.challenges <= 0) {
    player.level = 1; player.xp = 0; player.challenges = player.maxChallenges; player.statPoints = 0;
    player.statsAlloc = { hp: 0, atk: 0, def: 0, luk: 0 }; player.defeatedBosses = {};
    player.hp = getStats().hp; save(); render();
    alert("🎯 軀殼壽命已耗盡！輪迴法陣強制啟動！\n\n【靈魂重置】\n★ 等級與屬性重置 (Lv.1)\n★ 所有 BOSS 全數復活！\n★ 金幣與倉庫裝備『完美繼承』！");
    switchTab('equipment');
    return true;
  }
  return false;
}

async function fightMob(mob) {
  if (fightRunning) return;
  if (mob.isBoss && player.defeatedBosses[mob.id]) {
    addLog(`❌ 【${mob.name}】在本輪迴已被抹殺，等待轉生復活！`, "log-lose");
    return;
  }
  if (player.challenges <= 0) { checkAndTriggerRebirth(); return; }

  fightRunning = true; switchTab('battle');
  const stats = getStats();
  let myHp = stats.hp, enHp = mob.hp, myMaxHp = stats.hp, enMaxHp = mob.hp;

  document.getElementById("combatants").style.display = "grid";
  document.getElementById("enemy-name").textContent = mob.icon + " " + mob.name;
  updateHPBars(myHp, myMaxHp, enHp, enMaxHp); clearLog();
  addLog(`⚔️ 戰鬥突入：<b>${mob.name}</b>`, "");

  let round = 0, won = false;
  while (myHp > 0 && enHp > 0) {
    round++; await sleep(60);
    const pDmg = Math.max(1, stats.atk - mob.def);
    enHp = Math.max(0, enHp - pDmg);
    let healText = "";
    if (stats.lifesteal > 0) {
      const healAmount = Math.floor(pDmg * stats.lifesteal);
      if (healAmount > 0) { myHp = Math.min(myMaxHp, myHp + healAmount); healText = ` (🩸+${healAmount})`; }
    }
    addLog(`<span class="log-hit">🗡️ 你造成 ${pDmg} 傷害${healText}</span>`);
    updateHPBars(myHp, myMaxHp, enHp, enMaxHp);
    if (enHp <= 0) { won = true; break; }

    await sleep(40);
    const eDmg = Math.max(1, mob.atk - stats.def);
    myHp = Math.max(0, myHp - eDmg);
    addLog(`<span class="log-mob">💥 受到反擊 ${eDmg} 傷害</span>`);
    updateHPBars(myHp, myMaxHp, enHp, enMaxHp);
    if (round > 100) break; 
  }

  player.challenges--; await sleep(100);
  if (won) {
    const finalGold = Math.floor((mob.gold || 5) * (1 + stats.goldBonus));
    player.gold += finalGold;
    addLog(`<span class="log-win">✅ 勝利！獲得 ${mob.xp} 經驗與 💰 ${finalGold}！</span>`);
    player.discovered[mob.id] = true;
    if (gainXP(mob.xp)) addLog(`<span class="log-level">⬆️ 靈魂境界突破！快去配點！</span>`);

    const finalDropChance = (mob.isBoss ? 0.18 : 0.05) + stats.dropRate;
    if (Math.random() < finalDropChance) {
      const drop = mob.drops[Math.floor(Math.random() * mob.drops.length)];
      player.inventory.push(drop);
      addLog(`<span class="log-drop">💎 獲得裝備：【${drop}】</span>`);
    }

    if (mob.isBoss) {
      player.defeatedBosses[mob.id] = true;
      if (player.unlockedZone <= selectedZone && selectedZone + 1 < ZONES.length) {
        player.unlockedZone = selectedZone + 1;
        addLog(`<span class="log-level">🔓 新區域【${ZONES[selectedZone+1].name}】開拓！</span>`);
      }
    }
  } else {
    addLog(`<span class="log-lose">💀 軀殼破碎... 剩餘次數：${player.challenges}</span>`);
  }

  player.hp = getStats().hp; save(); fightRunning = false;
  if (!checkAndTriggerRebirth()) render();
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
function updateHPBars(myHp, myMax, enHp, enMax) {
  document.getElementById("php-val").textContent = `${myHp}/${myMax}`;
  document.getElementById("ehp-val").textContent = `${enHp}/${enMax}`;
  document.getElementById("php-bar").style.width = (myHp/myMax*100) + "%";
  document.getElementById("ehp-bar").style.width = (enHp/enMax*100) + "%";
}

function allocateStat(type) {
  if (player.statPoints <= 0) return;
  player.statPoints--; player.statsAlloc[type]++;
  player.hp = getStats().hp; save(); render();
}

function addLog(msg) {
  const el = document.getElementById("clog");
  const d = document.createElement("div"); d.innerHTML = msg; el.insertBefore(d, el.firstChild);
}
function clearLog() { document.getElementById("clog").innerHTML = ""; }

function switchTab(name) {
  document.querySelectorAll(".tab").forEach(t => t.classList.toggle("active", t.dataset.tab === name));
  document.querySelectorAll(".tab-content").forEach(t => t.classList.toggle("active", t.id === "tab-"+name));
  if (name === "shop") renderShop();
  if (name === "equipment") renderEquipment();
  if (name === "bestiary") renderBestiary();
}

function selectZone(zoneId) { selectedZone = zoneId; render(); }
function equip(idx) {
  const name = player.inventory[idx]; if (!ITEM_DB[name]) return;
  const it = ITEM_DB[name], old = player.equipment[it.slot];
  player.equipment[it.slot] = name; player.inventory.splice(idx, 1);
  if (old) player.inventory.push(old);
  save(); render();
}

function buyItem(name, price) {
  if (player.gold < price) { alert("金幣不足！"); return; }
  player.gold -= price; player.inventory.push(name); save();
  renderShop(); renderTopbar();
}

function resetAll() {
  if (!confirm("確定要清除所有存檔嗎？")) return;
  localStorage.removeItem("mcrpg_rebirth_v2"); location.reload();
}

function render() {
  renderTopbar(); renderZones(); renderMobGrid();
  if (document.getElementById("tab-equipment").classList.contains("active")) renderEquipment();
}

function renderTopbar() {
  const s = getStats(), xpPct = Math.min(100, (player.xp / xpForNext()) * 100);
  document.getElementById("tab-btn-eq").innerHTML = `🎒 背包 ${player.statPoints > 0 ? `<b style="color:var(--accent2)">(${player.statPoints})</b>` : ''}`;
  document.getElementById("topstats").innerHTML = `
    <div class="stat-chip">👤 Lv.<b>${player.level}</b></div>
    <div class="stat-chip">❤️ HP: <b>${s.hp}</b></div>
    <div class="stat-chip">⚔️ ATK: <b>${s.atk}</b></div>
    <div class="stat-chip">💰 金幣: <b style="color:#ffd700;">${player.gold}</b></div>
    <div class="stat-chip">🎯 餘次: <b>${player.challenges}</b></div>
  `;
}

function renderZones() {
  const el = document.getElementById("zone-list"); el.innerHTML = "";
  ZONES.forEach((z, i) => {
    const locked = i > player.unlockedZone;
    const div = document.createElement("div");
    div.className = "zone-card" + (locked ? " locked" : "") + (selectedZone === i && !locked ? " active" : "");
    div.innerHTML = `<span style="font-size:16px;">${z.icon}</span> <span class="zone-name" style="color:${locked?"#666":z.color}">${locked ? "🔒 " : ""}${z.name}</span>`;
    if (!locked) div.onclick = () => selectZone(i);
    el.appendChild(div);
  });
}

function renderMobGrid() {
  const z = ZONES[selectedZone], locked = selectedZone > player.unlockedZone;
  document.getElementById("zone-label").textContent = z.icon + " " + z.name;
  document.getElementById("zone-desc").textContent = z.desc;
  document.getElementById("challenges-badge").textContent = `🎯 剩餘: ${player.challenges}戰`;

  const grid = document.getElementById("mob-grid"); grid.innerHTML = "";
  if (locked) return;

  z.mobs.forEach(mob => {
    const card = document.createElement("div");
    if (mob.isBoss && player.defeatedBosses[mob.id]) {
      card.className = "mob-card is-boss disabled-boss"; card.style.opacity = "0.4";
      card.innerHTML = `<div class="mob-name" style="text-decoration:line-through;">${mob.name} [已斬殺]</div>`;
    } else {
      card.className = "mob-card" + (mob.isBoss ? " is-boss" : "");
      card.innerHTML = `
        <div class="mob-name">${mob.icon} ${mob.name} ${mob.isBoss?'👑':''}</div>
        <div class="mob-stats">
          <div>❤️ ${mob.hp}</div><div>⚔️ ${mob.atk}</div>
        </div>
      `;
      card.onclick = () => fightMob(mob);
    }
    grid.appendChild(card);
  });
}

function renderShop() {
  const grid = document.getElementById("shop-grid"); grid.innerHTML = "";
  SHOP_ITEMS.forEach(item => {
    const it = ITEM_DB[item.name]; if (!it) return;
    const card = document.createElement("div"); card.className = "mob-card";
    card.innerHTML = `
      <div style="font-weight:700;color:var(--accent); font-size:12px;">${item.name}</div>
      <div style="font-size:11px;color:var(--muted);margin:4px 0;">${it.desc}</div>
      <button class="btn btn-gold btn-sm" style="width:100%;" ${player.gold < item.price ? 'disabled' : ''} onclick="buyItem('${item.name}', ${item.price})">💰 ${item.price}</button>
    `;
    grid.appendChild(card);
  });
}

function renderEquipment() {
  const s = getStats();
  document.getElementById("stat-alloc-panel").innerHTML = `
    <div style="background:var(--panel2); padding:10px; border-radius:8px; border:1px solid var(--border); margin-bottom:10px;">
      <div style="font-weight:bold; color:var(--accent); font-size:13px; margin-bottom:6px;">✨ 點數: <span style="color:var(--accent2);">${player.statPoints}</span></div>
      <div style="display:grid; grid-template-columns: 1fr 1fr; gap:6px; font-size:12px;">
        <div class="flex" style="justify-content:space-between; background:var(--panel); padding:4px 8px; border-radius:6px;">
          <span>❤️ 生命: <b>${player.statsAlloc.hp}</b></span><button class="btn btn-gold btn-sm" ${player.statPoints<=0?'disabled':''} onclick="allocateStat('hp')">+</button>
        </div>
        <div class="flex" style="justify-content:space-between; background:var(--panel); padding:4px 8px; border-radius:6px;">
          <span>⚔️ 攻擊: <b>${player.statsAlloc.atk}</b></span><button class="btn btn-gold btn-sm" ${player.statPoints<=0?'disabled':''} onclick="allocateStat('atk')">+</button>
        </div>
      </div>
    </div>
  `;

  for (const slot of ["weapon","armor","acc"]) {
    const n = player.equipment[slot];
    document.getElementById("eq-"+slot).innerHTML = n ? `<span class="item r${ITEM_DB[n].rarity}">${n}</span>` : '空';
  }

  const inv = document.getElementById("inventory"); inv.innerHTML = "";
  document.getElementById("inv-count").textContent = `(${player.inventory.length})`;
  player.inventory.forEach((name, i) => {
    const span = document.createElement("span"); span.className = `item r${ITEM_DB[name].rarity}`;
    span.textContent = name; span.onclick = () => equip(i); inv.appendChild(span);
  });

  document.getElementById("stats-detail").innerHTML = `
    <div style="font-size:12px; color:var(--muted);">
      🩸 吸血: ${Math.floor(s.lifesteal*100)}% | 🍀 掉寶: +${Math.floor(s.dropRate*100)}%
    </div>
  `;
}

function renderBestiary() {
  const grid = document.getElementById("bestiary-grid"); grid.innerHTML = "";
  ZONES.forEach(z => {
    z.mobs.forEach(mob => {
      const known = player.discovered[mob.id];
      const card = document.createElement("div"); card.className = "bestiary-card" + (known ? "" : " undiscovered");
      card.innerHTML = `<div style="font-size:12px;">${known ? mob.icon + " " + mob.name : "❓ 未知生物"}</div>`;
      grid.appendChild(card);
    });
  });
}

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js')
      .then(reg => console.log('PWA SW 註冊成功！', reg.scope))
      .catch(err => console.log('PWA SW 註冊失敗：', err));
  });
}

load(); render();
</script>
